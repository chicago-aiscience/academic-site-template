# Jupyter Book (via MyST) GitHub Pages Deploy
# Ensure your GitHub Pages settings are set to deploy with **GitHub Actions**.

name: Jupyter Book (via myst) GitHub Pages Deploy
on:
  push:
    branches: [main]
env:
  # BASE_URL determines the URL path your site is served from, relative to the domain root.
  # - User/org site (e.g. yourusername.github.io): set BASE_URL=''
  # - Project site (e.g. yourusername.github.io/myrepo): set BASE_URL='/myrepo'
  BASE_URL: ''

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v3

      - uses: actions/setup-node@v4
        with:
          node-version: 18.x

      - name: Install Jupyter Book (via myst)
        run: npm install -g jupyter-book

      - name: Build HTML Assets
        working-directory: ./docs
        run: jupyter-book build --html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './docs/_build/html'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
